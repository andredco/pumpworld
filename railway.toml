# Railway: deploy this repo as the **sim** service (Node).
# Add a **persistent volume** mounted at `/data` and set `PUMPWORLD_DATA_DIR=/data`
# in the service variables so the town survives redeploys.

[build]
builder = "nixpacks"
buildCommand = "npm ci"

[deploy]
startCommand = "npm run start -w @pumpworld/sim"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
